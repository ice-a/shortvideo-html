<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <title>短视频解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js?v=20260326"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swiper@8/swiper-bundle.min.css">
    <script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#EA580C',
                        brandDeep: '#9A3412',
                        ink: '#18181B',
                        mist: '#FFF7ED',
                        sand: '#FED7AA'
                    },
                    fontFamily: {
                        sans: ['"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif']
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(120, 53, 15, 0.14)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .surface-card {
                background: rgba(255, 255, 255, 0.78);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                border: 1px solid rgba(255, 255, 255, 0.7);
                box-shadow: 0 18px 40px rgba(120, 53, 15, 0.12);
            }

            .card-neomorphism {
                @apply surface-card rounded-[28px];
            }

            .input-neomorphism {
                @apply w-full rounded-2xl border border-orange-100 bg-white/90 px-5 py-4 text-base text-ink outline-none transition focus:border-brand focus:ring-4 focus:ring-orange-100;
            }

            .button-neomorphism {
                @apply rounded-2xl bg-ink px-6 py-4 font-semibold text-white transition hover:-translate-y-0.5 hover:bg-brand active:translate-y-0;
            }

            .platform-btn {
                @apply rounded-full border border-orange-200 bg-white/75 px-4 py-2 text-sm font-medium text-ink/70 transition hover:border-orange-300 hover:bg-white hover:text-ink;
            }

            .platform-btn.active {
                @apply border-transparent bg-ink text-white;
            }

            .gallery-nav-button {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;
                width: 42px;
                height: 42px;
                border-radius: 9999px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(24, 24, 27, 0.72);
                color: #fff;
            }

            .gallery-pagination {
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                text-align: center;
            }

            .gallery-pagination .swiper-pagination-bullet {
                width: 8px;
                height: 8px;
                margin: 0 4px;
                background: rgba(24, 24, 27, 0.28);
            }

            .gallery-pagination .swiper-pagination-bullet-active {
                background: #18181B;
                transform: scale(1.15);
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-[radial-gradient(circle_at_top,_#fff7ed,_#fffbf5_45%,_#fff_100%)] font-sans text-ink">
<div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute left-[8%] top-24 h-56 w-56 rounded-full bg-orange-200/60 blur-3xl"></div>
    <div class="absolute bottom-16 right-[10%] h-72 w-72 rounded-full bg-amber-100 blur-3xl"></div>
    <div class="absolute left-1/2 top-1/3 h-80 w-80 -translate-x-1/2 rounded-full bg-white/70 blur-3xl"></div>
</div>

<header id="navbar" class="fixed left-0 right-0 top-0 z-50 transition-all duration-300">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-5">
        <div class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-ink text-white shadow-soft">
                <i class="fa fa-play-circle text-lg"></i>
            </div>
            <div>
                <div class="text-lg font-semibold tracking-tight">短视频解析</div>
                <div class="text-xs text-ink/50">精简版界面</div>
            </div>
        </div>
        <div class="hidden rounded-full border border-white/70 bg-white/70 px-4 py-2 text-sm text-ink/70 shadow-soft md:block">
            粘贴链接后直接解析
        </div>
    </div>
</header>

<main class="mx-auto flex min-h-screen max-w-6xl items-center px-4 pb-16 pt-28">
    <section class="grid w-full gap-10 lg:grid-cols-[1.1fr_0.9fr] lg:items-start">
        <div class="pt-4">
            <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-orange-200 bg-white/80 px-4 py-2 text-sm text-brandDeep shadow-soft">
                <i class="fa fa-bolt"></i>
                只保留解析所需内容
            </div>
            <h1 class="max-w-3xl text-[clamp(2.4rem,5vw,4.8rem)] font-semibold leading-[1.02] tracking-tight text-ink">
                复制分享文案或视频链接，直接拿到可下载内容。
            </h1>
            <p class="mt-5 max-w-2xl text-lg leading-8 text-ink/68">
                页面已移除教程、联系方式、项目地址和冗余展示，只保留解析、预览和下载相关区域。
            </p>

            <div class="mt-8 grid gap-3 sm:grid-cols-3">
                <div class="surface-card rounded-2xl px-5 py-4">
                    <div class="text-sm text-ink/45">能力</div>
                    <div class="mt-1 font-medium">无水印视频下载</div>
                </div>
                <div class="surface-card rounded-2xl px-5 py-4">
                    <div class="text-sm text-ink/45">能力</div>
                    <div class="mt-1 font-medium">图集与实况提取</div>
                </div>
                <div class="surface-card rounded-2xl px-5 py-4">
                    <div class="text-sm text-ink/45">体验</div>
                    <div class="mt-1 font-medium">自动识别文本中的链接</div>
                </div>
            </div>
        </div>

        <div class="card-neomorphism p-6 sm:p-8">
            <div class="mb-6 flex flex-wrap gap-3">
                <button class="platform-btn active" data-platform="all">
                    <i class="fa fa-globe mr-1"></i> 全平台
                </button>
                <button class="platform-btn" data-platform="douyin">
                    <i class="fa fa-music mr-1"></i> 抖音
                </button>
                <button class="platform-btn" data-platform="kuaishou">
                    <i class="fa fa-bolt mr-1"></i> 快手
                </button>
                <button class="platform-btn" data-platform="bilibili">
                    <i class="fa fa-play-circle mr-1"></i> B站
                </button>
                <button class="platform-btn" data-platform="toutiao">
                    <i class="fa fa-bookmark mr-1"></i> 今日头条
                </button>
            </div>

            <div class="mb-4">
                <label for="video-url" class="mb-2 block text-sm font-medium text-ink/60">输入链接或分享文案</label>
                <div class="relative">
                    <input
                        type="text"
                        id="video-url"
                        class="input-neomorphism pr-12"
                        placeholder="粘贴视频链接、分享口令或包含链接的整段文案">
                    <button
                        id="clear-btn"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-ink/35 transition hover:text-ink/70"
                        type="button"
                        aria-label="清空输入">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </div>
            </div>

            <button
                id="parse-btn"
                class="button-neomorphism flex w-full items-center justify-center gap-2 text-base">
                <i class="fa fa-magic"></i>
                <span>立即解析</span>
                <div id="parse-loader" class="hidden">
                    <i class="fa fa-spinner fa-spin"></i>
                </div>
            </button>

            <div class="mt-4 rounded-2xl border border-orange-100 bg-orange-50/70 px-4 py-3 text-sm leading-6 text-ink/62">
                支持直接粘贴文本，系统会自动提取其中的有效链接，并在下方展示结果。
            </div>

            <div id="result-container" class="mt-8 hidden"></div>

            <div id="loading-container" class="mt-8 hidden">
                <div class="rounded-2xl border border-orange-100 bg-white/85 px-6 py-8 text-center">
                    <div class="mx-auto mb-4 h-14 w-14 animate-spin rounded-full border-4 border-orange-100 border-t-brand"></div>
                    <p class="text-lg font-semibold">正在解析内容</p>
                    <p class="mt-2 text-sm text-ink/50">通常只需要几秒钟。</p>
                </div>
            </div>

            <div id="error-container" class="mt-8 hidden">
                <div class="rounded-2xl border border-red-200 bg-red-50 px-5 py-4">
                    <div class="flex items-start gap-3">
                        <i class="fa fa-circle-exclamation mt-1 text-red-500"></i>
                        <div>
                            <div class="font-medium text-red-800">解析失败</div>
                            <p id="error-message" class="mt-1 text-sm text-red-600"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
